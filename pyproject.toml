[project]
name = "pictova"
version = "0.1.0"
description = "Visual intelligence layer — finds, selects, and places images from any source into WordPress and beyond."
requires-python = ">=3.9"

[project.scripts]
pictova = "src.pictova.app.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["yo_unsplash", "yo_adaptive_filter", "yo_yoldaolmak_filter"]

[tool.setuptools.packages.find]
where = ["."]
