profile_id: sample-publisher
brand_name: Sample Publisher
cms_type: generic
language: en

image_sources:
  - local

output_rules:
  format: webp
  max_width: 1200
  max_height: 800
  quality: 85

filename_rules:
  prefix: pictovap_
  case: lowercase
  separator: "-"

alt_text_rules:
  language: en
  max_length: 125
  avoid_word: image

caption_rules:
  language: en
  include_attribution: true

editorial_preferences:
  tone: neutral
  style: documentary

forbidden_patterns:
  - tourists holding maps
  - stock photo handshake
  - generic office backgrounds
