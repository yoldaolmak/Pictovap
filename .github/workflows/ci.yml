name: CI

permissions: read-all

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # A real (non-editable) install: `pip install -e .` has masked
      # packaging bugs before (missing package __init__, data files that
      # only exist in a source checkout). Tests must run against what a
      # PyPI user actually gets.
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Run unit tests
        run: pytest tests/unit -v

      - name: Demo smoke test
        run: python -m pictovap.demo

  adapter-examples:
    name: Standalone adapter packages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Pictovap and standalone packages
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
          pip install -e examples/adapters/pictovap-pixabay
          pip install -e examples/adapters/pictovap-wikimedia
          pip install -e examples/adapters/pictovap-hugo
          pip install -e examples/external-renderer-package
          pip install build

      - name: Run standalone package tests
        run: |
          (cd examples/adapters/pictovap-pixabay && pytest -q)
          (cd examples/adapters/pictovap-wikimedia && pytest -q)
          (cd examples/adapters/pictovap-hugo && pytest -q)
          (cd examples/external-renderer-package && pytest -q)

      - name: Verify plugin discovery and conformance
        run: |
          pictovap plugins --kind provider
          pictovap plugins --kind cms
          pictovap plugins --kind renderer
          pictovap adapter check --kind provider --name pixabay
          pictovap adapter check --kind provider --name wikimedia
          pictovap adapter check --kind cms --name hugo
          pictovap adapter check --kind renderer --name external-html-review

      - name: Build standalone wheels
        run: |
          python -m build --wheel --outdir /tmp/pictovap-pixabay-wheel examples/adapters/pictovap-pixabay
          python -m build --wheel --outdir /tmp/pictovap-wikimedia-wheel examples/adapters/pictovap-wikimedia
          python -m build --wheel --outdir /tmp/pictovap-hugo-wheel examples/adapters/pictovap-hugo
          python -m build --wheel --outdir /tmp/pictovap-renderer-wheel examples/external-renderer-package

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run static type checks
        run: |
          python -m pip install --upgrade pip
          pip install ".[typecheck]"
          pyright

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ".[lint]"

      - name: Run flake8
        run: flake8 src/ --max-line-length=120

  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"

      - name: Check Markdown structure
        run: npx --yes markdownlint-cli2@0.23.0 --config .markdownlint.json 'README.md' 'CONTRIBUTING.md' 'SECURITY.md' 'CODE_OF_CONDUCT.md' 'CHANGELOG.md' 'docs/**/*.md' 'examples/**/*.md' 'src/pictovap/**/*.md' 'tests/**/*.md'
