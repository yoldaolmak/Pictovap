name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # A real (non-editable) install: `pip install -e .` has masked
      # packaging bugs before (missing package __init__, data files that
      # only exist in a source checkout). Tests must run against what a
      # PyPI user actually gets.
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Run unit tests
        run: pytest tests/unit -v

      - name: Demo smoke test
        run: python -m pictovap.demo

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install flake8

      - name: Run flake8
        run: flake8 src/ --max-line-length=120
