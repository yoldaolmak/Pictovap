name: 'Pictovap Visual Planning'
description: 'Automate visual planning and image candidate selection for markdown articles'
author: 'Yoldaolmak'

branding:
  icon: 'image'
  color: 'blue'

inputs:
  article:
    description: 'Path to the markdown article'
    required: true
  profile:
    description: 'Path to the publisher profile YAML'
    required: false
  output:
    description: 'Path to write the JSON plan'
    required: false
    default: 'pictovap-plan.json'
  report:
    description: 'Path to write the markdown report'
    required: false
    default: 'pictovap-report.md'

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Pictovap
      shell: bash
      run: pip install pictovap

    - name: Run Pictovap Plan
      shell: bash
      env:
        PICTOVAP_ARTICLE: ${{ inputs.article }}
        PICTOVAP_PROFILE: ${{ inputs.profile }}
        PICTOVAP_OUTPUT: ${{ inputs.output }}
        PICTOVAP_REPORT: ${{ inputs.report }}
      run: |
        set -euo pipefail
        plan_args=(plan --article "$PICTOVAP_ARTICLE" --output "$PICTOVAP_OUTPUT" --report "$PICTOVAP_REPORT")
        if [[ -n "$PICTOVAP_PROFILE" ]]; then
          plan_args+=(--profile "$PICTOVAP_PROFILE")
        fi
        pictovap "${plan_args[@]}"
